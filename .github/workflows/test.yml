name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call: # invoked as a gate by release.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync
      - name: Ruff lint
        run: uv run ruff check
      - name: Ruff format
        run: uv run ruff format --check
      - name: Pyrefly (strict)
        run: uv run pyrefly check

  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          # One macOS run to catch platform-specific pysam/cyvcf2 issues.
          - python-version: "3.13"
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - name: Pytest
        run: uv run pytest -q

  smoke:
    name: Clean-room wheel import
    runs-on: ubuntu-latest
    # Builds the wheel and imports it in a fresh venv with ONLY runtime deps
    # (no dev group). Catches any src/ module reaching for a dependency that
    # isn't declared in [project].dependencies — a bug the dev-synced test job
    # above cannot see, since it installs dev deps.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv build
      - name: Import from clean runtime-only venv
        run: |
          uv venv /tmp/clean
          uv pip install --python /tmp/clean dist/*.whl
          /tmp/clean/bin/python -c 'import vcfixture, vcfixture.strategies'
